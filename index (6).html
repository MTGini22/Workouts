<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Workout Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f4f4f2;color:#1a1a1a;font-size:14px}
.app{max-width:760px;margin:0 auto;padding:16px 14px 60px}
h1{font-size:19px;font-weight:600;margin-bottom:2px}
.sub{font-size:11px;color:#999;margin-bottom:14px}
.tnav{display:flex;gap:2px;background:#e3e3e1;border-radius:10px;padding:3px;margin-bottom:14px;position:sticky;top:8px;z-index:100}
.tbtn{flex:1;padding:7px 4px;border:none;background:transparent;border-radius:7px;font-size:12px;font-weight:500;color:#666;cursor:pointer}
.tbtn.on{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.tc{display:none}.tc.on{display:block}
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.mc{background:#fff;border-radius:10px;padding:10px 12px;border:1px solid #e8e8e6}
.ml{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.mv{font-size:20px;font-weight:600}
.ms{font-size:10px;color:#bbb;margin-top:2px}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.pill{padding:5px 13px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:#555}
.pill.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.exlist{background:#fff;border-radius:12px;border:1px solid #e8e8e6;overflow:hidden;margin-bottom:12px}
.exrow{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 13px;border-bottom:1px solid #f2f2f0;gap:8px}
.exrow:last-child{border-bottom:none}
.exn{font-weight:500;font-size:13px}
.exm{font-size:11px;color:#999;margin-top:2px;line-height:1.45}
.ext{font-size:12px;font-weight:600;text-align:right;flex-shrink:0}
.up{color:#16a34a}.fl{color:#bbb}.dn{color:#dc2626}
.cwrap{background:#fff;border-radius:12px;border:1px solid #e8e8e6;padding:12px;margin-bottom:12px}
.cleg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px}
.cli{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.csw{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.workout-btn{display:block;width:100%;padding:13px;background:#fff;border:1px solid #e8e8e6;border-radius:12px;margin-bottom:9px;text-align:left;cursor:pointer}
.workout-btn:hover{border-color:#bbb}
.wb-name{font-size:14px;font-weight:600;margin-bottom:2px}
.wb-meta{font-size:11px;color:#999}
.logform{display:none}.logform.show{display:block}
.ex-block{background:#fff;border:1px solid #e8e8e6;border-radius:12px;margin-bottom:9px;overflow:hidden}
.ex-head{padding:9px 13px;background:#fafaf8;border-bottom:1px solid #f0f0ee;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ex-prev{font-size:11px;color:#999;font-weight:400;text-align:right;max-width:55%;line-height:1.35}
.setrows{padding:8px 13px 10px}
.setrow{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.slbl{font-size:11px;color:#999;width:34px;flex-shrink:0}
.gtag{font-size:10px;color:#777;background:#f0f0ee;border-radius:4px;padding:2px 5px;flex-shrink:0}
.sin{flex:1;padding:7px 9px;border:1px solid #ddd;border-radius:7px;font-size:16px;font-family:inherit;outline:none;min-width:0}
.sin:focus{border-color:#888}
.datein{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:9px;font-size:14px;font-family:inherit;outline:none;margin-bottom:11px}
.savebtn{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:500;cursor:pointer;margin-top:3px;font-family:inherit}
.backbtn{background:none;border:none;color:#666;font-size:13px;cursor:pointer;padding:0;margin-bottom:13px;display:block}
.okmsg{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:9px;padding:10px 13px;color:#166534;font-size:12px;margin-bottom:11px;display:none}
.clbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:8px}
.reccard{background:#fff;border:1px solid #e8e8e6;border-radius:11px;overflow:hidden;margin-bottom:7px}
.rechead{padding:9px 13px;border-bottom:1px solid #f0f0ee;display:flex;align-items:center;justify-content:space-between}
.recname{font-weight:600;font-size:13px}
.recbadge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.bup{background:#f0fdf4;color:#166534}.bhold{background:#fefce8;color:#854d0e}.btech{background:#eff6ff;color:#1d4ed8}.bnew{background:#fdf4ff;color:#7e22ce}.bswap{background:#fff7ed;color:#c2410c}
.mode-bar{display:flex;gap:6px;margin-bottom:12px}
.mode-btn{flex:1;padding:8px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:12px;font-weight:500;color:#666;cursor:pointer}
.mode-btn.mode-on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.looks-good-btn{width:100%;padding:14px;background:#16a34a;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:500;cursor:pointer;margin-top:12px;font-family:inherit}
.looks-good-btn:hover{background:#15803d}
.rec-actions{display:flex;gap:8px;margin-top:10px}
.rec-act-btn{flex:1;padding:6px;border:1px solid #e8e8e6;border-radius:7px;background:#f4f4f2;font-size:11px;color:#555;cursor:pointer;font-family:inherit}
.rec-act-btn:hover{background:#ebebea;color:#1a1a1a}
.tut-area{font-size:12px;color:#555;line-height:1.55;margin-top:8px;padding:8px 10px;background:#f9f9f7;border-radius:7px;border-left:3px solid #2563eb}
.recbody{padding:9px 13px}
.rectgt{font-size:13px;font-weight:500;margin-bottom:3px}
.recreason{font-size:11px;color:#888;line-height:1.45}
.chatwrap{background:#fff;border-radius:12px;border:1px solid #e8e8e6;overflow:hidden;margin-top:4px}
.qrow{display:flex;gap:5px;padding:9px 9px 0;flex-wrap:wrap}
.qbtn{background:#f4f4f2;border:1px solid #e8e8e6;border-radius:7px;padding:4px 8px;font-size:11px;color:#555;cursor:pointer;font-family:inherit}
.msgs{min-height:150px;max-height:340px;overflow-y:auto;padding:11px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;gap:6px}.msg.u{flex-direction:row-reverse}
.bbl{max-width:84%;padding:8px 11px;border-radius:11px;font-size:13px;line-height:1.5;white-space:pre-wrap}
.msg.a .bbl{background:#f4f4f2;border-radius:4px 11px 11px 11px}
.msg.u .bbl{background:#1a1a1a;color:#fff;border-radius:11px 4px 11px 11px}
.av{width:22px;height:22px;border-radius:50%;background:#e5e5e3;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#666;flex-shrink:0;margin-top:2px}
.irow{display:flex;gap:6px;padding:8px 9px;border-top:1px solid #e8e8e6}
.cin{flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;font-family:inherit;outline:none;resize:none;background:#fafaf8}
.sbtn{background:#1a1a1a;color:#fff;border:none;border-radius:7px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:inherit}
.sbtn:disabled{opacity:.4}
.sp{display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.emp{text-align:center;padding:24px;color:#ccc;font-size:13px}
.ldrec{padding:18px;color:#999;font-size:13px;text-align:center}
.chart-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:8px}
.leg-item{transition:opacity .15s;padding:2px 4px;border-radius:4px}
.leg-item:hover{background:#f0f0ee}
.leg-off .csw{opacity:0.3}
</style>
</head>
<body>

<div class="app">
  <h1>Workout tracker</h1>
  <p class="sub">Aug 2025 &ndash; present &nbsp;&middot;&nbsp; Push / Legs / Back</p>
  <div class="tnav">
    <button class="tbtn on" id="btn-ov" onclick="tab('ov')">Overview</button>
    <button class="tbtn" id="btn-pr" onclick="tab('pr')">Progress</button>
    <button class="tbtn" id="btn-log" onclick="tab('log')">Log</button>
    <button class="tbtn" id="btn-co" onclick="tab('co')">Coach</button>
  </div>
  <div id="tc-ov" class="tc on">
    <div class="mgrid" id="ov-metrics"></div>
    <div class="pills" id="ov-pills"></div>
    <div id="ov-exlist"></div>
  </div>
  <div id="tc-pr" class="tc">
    <div class="pills" id="pr-pills"></div>
    <div class="cleg" id="pr-leg" style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px"></div>
    <div class="cwrap">
      <p class="chart-lbl">Top weight (lb)</p>
      <div style="position:relative;height:200px"><canvas id="pr-chart-weight"></canvas></div>
    </div>
    <div class="cwrap">
      <p class="chart-lbl">Total volume (lb)</p>
      <div style="position:relative;height:200px"><canvas id="pr-chart-volume"></canvas></div>
    </div>
    <div class="cwrap">
      <p class="chart-lbl">Est. 1-rep max (lb)</p>
      <div style="position:relative;height:200px"><canvas id="pr-chart-e1rm"></canvas></div>
    </div>
  </div>
  <div id="tc-log" class="tc">
    <div id="log-home">
      <p style="font-size:12px;color:#999;margin-bottom:11px">Which workout are you logging?</p>
      <button class="workout-btn" onclick="startLog('Push')"><div class="wb-name">Push</div><div class="wb-meta" id="lm-Push">Chest &middot; Shoulders &middot; Triceps</div></button>
      <button class="workout-btn" onclick="startLog('Legs')"><div class="wb-name">Legs</div><div class="wb-meta" id="lm-Legs">Quads &middot; Hamstrings &middot; Glutes &middot; Calves</div></button>
      <button class="workout-btn" onclick="startLog('Back')"><div class="wb-name">Back</div><div class="wb-meta" id="lm-Back">Back &middot; Biceps &middot; Rear Delts</div></button>
    </div>
    <div id="log-form" class="logform">
      <button class="backbtn" onclick="backToHome()">&larr; Back</button>
      <div class="okmsg" id="okmsg"></div>
      <input type="date" class="datein" id="log-date">
      <div id="log-exs"></div>
      <button class="savebtn" onclick="saveSession()" style="background:#16a34a">Complete workout</button>
    </div>
  </div>
  <div id="tc-co" class="tc">
    <p class="clbl">Next session recommendations</p>
    <div class="pills" id="co-pills"></div>
    <div id="co-recs"><div class="ldrec">Select a workout above</div></div>
    <p class="clbl" style="margin-top:14px">Ask your coach</p>
    <div class="chatwrap">
      <div class="qrow">
        <button class="qbtn" onclick="q('What are my biggest strength gains?')">Top gains</button>
        <button class="qbtn" onclick="q('Which lifts am I plateauing on?')">Plateaus</button>
        <button class="qbtn" onclick="q('What new exercises should I add?')">Add exercises</button>
        <button class="qbtn" onclick="q('Any muscle imbalances?')">Imbalances</button>
        <button class="qbtn" onclick="q('Adjust training for Achilles and hip flexor issues?')">Injury advice</button>
      </div>
      <div class="msgs" id="msgs"><div class="emp">Ask anything about your training.</div></div>
      <div class="irow">
        <textarea class="cin" id="cin" rows="1" placeholder="Ask your coach..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
        <button class="sbtn" id="sbtn" onclick="sendMsg()">Send</button>
      </div>
    </div>
  </div>
</div>

async function swapExercise(wo,idx,currentEx){
  var card=document.getElementById("co-recs").querySelectorAll(".reccard")[idx];
  var tgt=card.querySelector(".rectgt");
  var rsn=card.querySelector(".recreason");
  tgt.textContent="Finding alternative..."; rsn.textContent="";
  var plan=currentPlan[wo]||[];
  var others=plan.map(function(r){return r.exercise;}).filter(function(e){return e!==currentEx;}).join(", ");
  var prompt="Suggest ONE alternative exercise to replace "+currentEx+" in a "+wo+" workout. Other exercises: "+others+". Athlete has Achilles tendinopathy and hip flexor strain. Respond ONLY with JSON object: exercise, target, action (swap), reason.";
  try{
    var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:200,messages:[{role:"user",content:prompt}]})});
    var d=await r.json();
    var txt=(d.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("").replace(/```json|```/g,"").trim();
    var alt=JSON.parse(txt);
    currentPlan[wo][idx]=alt;
    WOS[wo][idx]=alt.exercise;
    if(!CHART[wo][alt.exercise])CHART[wo][alt.exercise]=[];
    var nm=card.querySelector(".recname"); nm.textContent=alt.exercise;
    tgt.textContent=alt.target; rsn.textContent=alt.reason;
    var badge=card.querySelector(".recbadge"); badge.textContent="⇄ Swap"; badge.className="recbadge bswap";
  }catch(e){tgt.textContent="Swap failed — try again."; rsn.textContent="";}
}

function startLogFromPlan(wo){
  logWo=wo;
  document.getElementById("log-home").style.display="none";
  document.getElementById("log-form").classList.add("show");
  document.getElementById("okmsg").style.display="none";
  document.getElementById("log-date").value=new Date().toISOString().split("T")[0];
  var plan=currentPlan[wo]||[];
  var stored=loadS();
  var c=document.getElementById("log-exs"); c.innerHTML="";
  plan.forEach(function(rec){
    var exName=rec.exercise;
    var isPU=exName==="Pull-Ups"; var isBW=["Chest Dips","Pull-Ups"].indexOf(exName)>=0;
    // Parse target for pre-fill hints e.g. "5x5 @ 165lb" or "3x10 @ 35lb"
    var targetSets=3; var targetReps=""; var targetWeight="";
    var hasWarmup=rec.target.toLowerCase().indexOf("warmup")>=0||rec.target.toLowerCase().indexOf("warm")>=0;
    // Parse "5x5@165lb" or "4x8 @ 60lb" patterns
    var m=rec.target.match(/([0-9]+)x([0-9]+)[\s]*@?[\s]*([0-9\.]+)?/);
    if(m){targetSets=parseInt(m[1])||3; targetReps=m[2]||""; targetWeight=m[3]||"";}
    // Parse weight progressions like "135/145/155/165/165" - count slashes+1
    var progressMatch=rec.target.match(/([0-9]+(?:\/[0-9]+)+)lb/);
    var progressWeights=[];
    if(progressMatch){
      progressWeights=progressMatch[1].split("/").map(function(w){return w.trim();});
      targetSets=progressWeights.length;
    }
    // Parse "then NxN" for warmup+working sets
    var thenMatch=rec.target.match(/then\s+([0-9]+)x([0-9]+)\s*@?\s*([0-9\.]+)?/i);
    if(thenMatch){targetSets=parseInt(thenMatch[1])||3; targetReps=thenMatch[2]||targetReps; targetWeight=thenMatch[3]||targetWeight;}
    var last=(stored[wo]||{})[exName];
    var block=document.createElement("div"); block.className="ex-block";
    var head=document.createElement("div"); head.className="ex-head";
    var nameSpan=document.createElement("span"); nameSpan.textContent=exName;
    var targetSpan=document.createElement("span"); targetSpan.className="ex-prev";
    targetSpan.textContent=rec.target;
    head.appendChild(nameSpan); head.appendChild(targetSpan);
    var setrows=document.createElement("div"); setrows.className="setrows";
    var totalSets=hasWarmup?targetSets+1:targetSets;
    for(var i=0;i<totalSets;i++){
      var isWarmup=hasWarmup&&i===0;
      var row=document.createElement("div"); row.className="setrow";
      var lbl=document.createElement("span"); lbl.className="slbl";
      lbl.textContent=isWarmup?"Warmup":"Set "+(hasWarmup?i:i+1);
      row.appendChild(lbl);
      if(isPU){
        var gt=document.createElement("span"); gt.className="gtag";
        gt.textContent=PU_GRIPS[i]||"Neutral"; row.appendChild(gt);
      }
      var rInput=document.createElement("input");
      rInput.className="sin"; rInput.type="number"; rInput.inputMode="numeric";
      rInput.placeholder=targetReps?"reps ("+targetReps+")":"reps";
      rInput.setAttribute("data-ex",exName); rInput.setAttribute("data-si",i); rInput.setAttribute("data-f","reps");
      row.appendChild(rInput);
      if(!isBW){
        rInput.style.maxWidth="100px";
        var wInput=document.createElement("input");
        wInput.className="sin"; wInput.type="number"; wInput.inputMode="decimal";
        if(isWarmup&&targetWeight){
          wInput.placeholder="lbs (~"+(Math.round(parseFloat(targetWeight)*0.6/5)*5)+")";
        } else if(progressWeights.length){
          var pwIdx=hasWarmup?i-1:i;
          wInput.placeholder=progressWeights[pwIdx]?"lbs ("+progressWeights[pwIdx]+")":"lbs";
        } else {
          wInput.placeholder=targetWeight?"lbs ("+targetWeight+")":"lbs";
        }
        wInput.setAttribute("data-ex",exName); wInput.setAttribute("data-si",i); wInput.setAttribute("data-f","weight");
        row.appendChild(wInput);
      }
      setrows.appendChild(row);
    }
    block.appendChild(head); block.appendChild(setrows);
    c.appendChild(block);
  });
}

function appendWorkoutLog(entry){
  try{
    var log=JSON.parse(localStorage.getItem("wlog")||"[]");
    log.push(entry);
    // Keep last 50 sessions
    if(log.length>50)log=log.slice(log.length-50);
    localStorage.setItem("wlog",JSON.stringify(log));
  }catch(e){}
}
function getWorkoutLog(){
  try{return JSON.parse(localStorage.getItem("wlog")||"[]");}catch(e){return [];}
}
function getChatContext(){
  try{
    var chatLog=JSON.parse(localStorage.getItem("chatlog")||"[]");
    if(!chatLog.length)return "";
    var lines=["","ATHLETE NOTES FROM COACH CHAT (recent Q&A):"];
    chatLog.slice(-8).forEach(function(entry){
      lines.push(entry.date+" Q: "+entry.q);
      lines.push("  A: "+entry.a);
    });
    return lines.join("\n");
  }catch(e){return "";}
}
function buildLogContext(wo){
  var log=getWorkoutLog().filter(function(e){return e.workout===wo;});
  if(!log.length)return "";
  var lines=["","COMPLETED SESSION LOG (most recent first):"];
  log.slice().reverse().slice(0,10).forEach(function(entry){
    lines.push(entry.date+":");
    entry.exercises.forEach(function(ex){
      var line="  "+ex.name+": did "+ex.actual;
      if(ex.target)line+=" (target was "+ex.target+")";
      lines.push(line);
    });
  });
  return lines.join("\n");
}
function q(txt){document.getElementById("cin").value=txt;sendMsg();}
function addMsg(role,txt){
  var el=document.getElementById("msgs");
  var emp=el.querySelector(".emp"); if(emp)emp.remove();
  var d=document.createElement("div"); d.className="msg "+(role==="user"?"u":"a");
  var av=document.createElement("div"); av.className="av"; av.textContent=role==="user"?"M":"AI";
  var bbl=document.createElement("div"); bbl.className="bbl"; bbl.textContent=txt;
  d.appendChild(av); d.appendChild(bbl);
  el.appendChild(d); el.scrollTop=el.scrollHeight;
}
async function sendMsg(){
  var inp=document.getElementById("cin"); var txt=inp.value.trim(); if(!txt)return;
  inp.value=""; addMsg("user",txt); chatHist.push({role:"user",content:txt});
  var btn=document.getElementById("sbtn"); btn.disabled=true; btn.textContent="...";
  var sys="Expert strength coach. Full history: "+HISTORY+buildLogContext(activeCo||activeOv)+getChatContext()+". Former D1 soccer player, recreational soccer/running. Bilateral Achilles tendinopathy and hip flexor strain. Pull-Ups: neutral grip sets 1+3, wide grip sets 2+4, bodyweight. Be specific and concise.";
  var msgs=chatHist.length===1?[{role:"user",content:sys+"\n\nQuestion: "+txt}]:[{role:"user",content:sys}].concat(chatHist);
  try{
    var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:1000,messages:msgs})});
    var rdata=await r.json();
    var reply=(rdata.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
    addMsg("assistant",reply||"Something went wrong."); chatHist.push({role:"assistant",content:reply});
    // Store Q&A in workout log memory
    var lastQ=chatHist[chatHist.length-2];
    if(lastQ&&reply){
      try{
        var chatLog=JSON.parse(localStorage.getItem("chatlog")||"[]");
        chatLog.push({date:new Date().toISOString().split("T")[0],q:lastQ.content.slice(0,200),a:reply.slice(0,300)});
        if(chatLog.length>30)chatLog=chatLog.slice(chatLog.length-30);
        localStorage.setItem("chatlog",JSON.stringify(chatLog));
      }catch(e){}
    }
  }catch(e){addMsg("assistant","Coach needs internet connection to respond.");}
  btn.disabled=false; btn.textContent="Send";
}
